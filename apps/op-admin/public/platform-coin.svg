<svg width="24" height="24" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <!-- 渐变定义 -->
    <linearGradient id="coinGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#ffd700;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#ffed4e;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#f59e0b;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="innerGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#fbbf24;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#d97706;stop-opacity:1" />
    </linearGradient>
    <!-- 阴影滤镜 -->
    <filter id="shadow" x="-50%" y="-50%" width="200%" height="200%">
      <feDropShadow dx="1" dy="1" stdDeviation="1" flood-color="rgba(0,0,0,0.3)"/>
    </filter>
  </defs>
  
  <!-- 外层金属环 -->
  <circle cx="12" cy="12" r="11" fill="url(#coinGradient)" stroke="#b45309" stroke-width="1" filter="url(#shadow)"/>
  
  <!-- 内层圆环 -->
  <circle cx="12" cy="12" r="8.5" fill="url(#innerGradient)" stroke="#92400e" stroke-width="0.5"/>
  
  <!-- 装饰齿轮边缘 -->
  <circle cx="12" cy="12" r="10" fill="none" stroke="#b45309" stroke-width="0.5" stroke-dasharray="1,1"/>
  
  <!-- 中心六边形 -->
  <polygon points="12,6 15.5,8.5 15.5,11.5 12,14 8.5,11.5 8.5,8.5" fill="rgba(255,255,255,0.9)" stroke="#92400e" stroke-width="0.5"/>
  
  <!-- 中心P字符 -->
  <text x="12" y="11.5" text-anchor="middle" font-family="Arial, sans-serif" font-size="6" font-weight="bold" fill="#92400e">P</text>
  
  <!-- 光泽效果 -->
  <ellipse cx="9" cy="8" rx="2" ry="1" fill="rgba(255,255,255,0.6)" opacity="0.7"/>
  <ellipse cx="15" cy="16" rx="1.5" ry="0.8" fill="rgba(255,255,255,0.3)" opacity="0.5"/>
  
  <!-- 内圈装饰线 -->
  <circle cx="12" cy="12" r="6.5" fill="none" stroke="rgba(255,255,255,0.4)" stroke-width="0.3"/>
  <circle cx="12" cy="12" r="4.5" fill="none" stroke="rgba(139,69,19,0.3)" stroke-width="0.3"/>
</svg> 