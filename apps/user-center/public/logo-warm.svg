<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" fill="none">
  <defs>
    <linearGradient id="coinBody" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#FFD700"/>
      <stop offset="40%" stop-color="#FFC107"/>
      <stop offset="100%" stop-color="#FF8F00"/>
    </linearGradient>
    <linearGradient id="coinShine" x1="0.2" y1="0" x2="0.8" y2="1">
      <stop offset="0%" stop-color="#FFF8E1" stop-opacity="0.6"/>
      <stop offset="100%" stop-color="#FFD700" stop-opacity="0"/>
    </linearGradient>
    <linearGradient id="coinEdge" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#FFB300"/>
      <stop offset="100%" stop-color="#E65100"/>
    </linearGradient>
  </defs>
  <!-- 阴影 -->
  <ellipse cx="32" cy="56" rx="20" ry="4" fill="#000" opacity="0.1"/>
  <!-- 硬币边缘（厚度感） -->
  <ellipse cx="32" cy="34" rx="26" ry="26" fill="url(#coinEdge)"/>
  <!-- 硬币正面 -->
  <circle cx="32" cy="32" r="26" fill="url(#coinBody)"/>
  <!-- 内圈 -->
  <circle cx="32" cy="32" r="21" fill="none" stroke="#E65100" stroke-width="1.5" stroke-opacity="0.3"/>
  <!-- ¥ 符号 -->
  <text x="32" y="40" text-anchor="middle" font-family="Arial, sans-serif" font-size="26" font-weight="bold" fill="#A83206">¥</text>
  <!-- 高光 -->
  <ellipse cx="24" cy="22" rx="12" ry="8" fill="url(#coinShine)" transform="rotate(-20 24 22)"/>
  <!-- 小星星装饰 -->
  <circle cx="44" cy="18" r="2" fill="#FFF8E1" opacity="0.8"/>
  <circle cx="48" cy="24" r="1.2" fill="#FFF8E1" opacity="0.5"/>
</svg>
