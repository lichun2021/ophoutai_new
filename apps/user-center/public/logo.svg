<svg width="300" height="100" viewBox="0 0 300 100" xmlns="http://www.w3.org/2000/svg">
  <!-- 背景 -->
  <defs>
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#0f172a;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#1e40af;stop-opacity:1" />
    </linearGradient>
    
    <linearGradient id="atomGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#06b6d4;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#3b82f6;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- 背景矩形 -->
  <rect width="300" height="100" fill="url(#bgGradient)" rx="10"/>
  
  <!-- 量子原子图标 -->
  <g transform="translate(25, 50)">
    <!-- 原子核 -->
    <circle cx="0" cy="0" r="3" fill="#06b6d4"/>
    
    <!-- 电子轨道1 -->
    <ellipse cx="0" cy="0" rx="15" ry="8" stroke="#3b82f6" stroke-width="1.5" fill="none" opacity="0.8"/>
    
    <!-- 电子轨道2 -->
    <ellipse cx="0" cy="0" rx="15" ry="8" stroke="#06b6d4" stroke-width="1.5" fill="none" opacity="0.8" transform="rotate(60)"/>
    
    <!-- 电子轨道3 -->
    <ellipse cx="0" cy="0" rx="15" ry="8" stroke="#3b82f6" stroke-width="1.5" fill="none" opacity="0.8" transform="rotate(-60)"/>
    
    <!-- 电子 -->
    <circle cx="15" cy="0" r="2" fill="#06b6d4"/>
    <circle cx="-7.5" cy="13" r="2" fill="#3b82f6" transform="rotate(60)"/>
    <circle cx="-7.5" cy="-13" r="2" fill="#06b6d4" transform="rotate(-60)"/>
  </g>
  
  <!-- 网络连接线 -->
  <g stroke="#06b6d4" stroke-width="1" opacity="0.6">
    <line x1="55" y1="45" x2="75" y2="35"/>
    <line x1="55" y1="55" x2="75" y2="65"/>
    <line x1="75" y1="35" x2="95" y2="45"/>
    <line x1="75" y1="65" x2="95" y2="55"/>
  </g>
  
  <!-- 连接节点 -->
  <circle cx="75" cy="35" r="2" fill="#3b82f6"/>
  <circle cx="75" cy="65" r="2" fill="#3b82f6"/>
  <circle cx="95" cy="45" r="2" fill="#06b6d4"/>
  <circle cx="95" cy="55" r="2" fill="#06b6d4"/>
  
  <!-- 主标题：量子发行 -->
  <text x="120" y="45" font-family="Microsoft YaHei, SimHei, sans-serif" font-size="20" font-weight="bold" fill="white">
    量子发行
  </text>
  
  <!-- 副标题：英文 -->
  <text x="120" y="65" font-family="Arial, sans-serif" font-size="12" fill="#06b6d4" opacity="0.9">
    QUANTUM PUBLISH
  </text>
  
  <!-- 装饰性粒子效果 -->
  <g opacity="0.7">
    <circle cx="250" cy="20" r="1.5" fill="#06b6d4"/>
    <circle cx="270" cy="30" r="1" fill="#3b82f6"/>
    <circle cx="260" cy="80" r="1.5" fill="#06b6d4"/>
    <circle cx="280" cy="70" r="1" fill="#3b82f6"/>
  </g>
</svg> 