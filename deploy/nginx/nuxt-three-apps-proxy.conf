# =============================================================================
# 反向代理（代理机 Nginx）→ 另一台公网服务器上的 Nuxt（HTTP 3001 / 3002 / 3003）
#
# 使用前请全局替换：203.0.113.10 → 你的「业务机」公网 IP（三处 server 里共 6 处 proxy_pass）
# 请替换三个 server_name、证书路径、root、日志路径为你的真实域名与宝塔路径
#
# 业务机：Nuxt 监听 0.0.0.0:3001–3003 且安全组/防火墙对「代理机 IP」放行
# 应用环境变量 BASE_URL 需为 https://对应域名
#
# 检测：nginx -t && nginx -s reload
# =============================================================================

# ---------------------------------------------------------------------------
# user-center → 业务机 :3001
# ---------------------------------------------------------------------------
server {
    listen 80;
    listen 443 ssl;
    listen 443 quic;
    http2 on;
    server_name user.example.com;

    index index.html;
    root /www/wwwroot/user.example.com;

    # 宝塔证书（路径按站点改）
    # include /www/server/panel/vhost/nginx/well-known/user.example.com.conf;
    ssl_certificate     /www/server/panel/vhost/cert/user.example.com/fullchain.pem;
    ssl_certificate_key /www/server/panel/vhost/cert/user.example.com/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers on;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 10m;
    add_header Strict-Transport-Security "max-age=31536000" always;
    error_page 497 https://$host$request_uri;

    if ($server_port = 80) {
        return 301 https://$host$request_uri;
    }

    location ^~ /_nuxt/ {
        proxy_pass http://203.0.113.10:3001;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        add_header Cache-Control "no-store, no-cache, must-revalidate, proxy-revalidate" always;
        add_header Pragma "no-cache" always;
        add_header Expires "0" always;
        proxy_cache off;
    }

    location / {
        proxy_pass http://203.0.113.10:3001/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_read_timeout 86400;
        proxy_connect_timeout 60s;
        proxy_send_timeout 60s;
    }

    access_log /www/wwwlogs/user.example.com.log;
    error_log  /www/wwwlogs/user.example.com.error.log;
}

